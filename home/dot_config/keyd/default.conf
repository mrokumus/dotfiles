[ids]
*

[main]
# CapsLock → tap: Esc, hold: Ctrl
capslock = overload(control, esc)

# ISO key (between left shift and z) → tilde
102nd = `

# Super (Win key) → Ctrl — mirrors Mac CMD behaviour
# Physical Super+C = Ctrl+C = copy, same finger as Cmd+C on Mac
leftmeta = leftcontrol
rightmeta = rightcontrol

[rightcontrol]
# Right Ctrl + hjkl → arrow keys
# Mac:   Right Cmd + hjkl (via Karabiner)
# Linux: Right Super → rightcontrol (via keyd) → this layer
h = left
j = down
k = up
l = right
