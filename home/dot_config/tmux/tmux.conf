# ==============================================================================
# GENERAL SETTINGS
# ==============================================================================
# Alacritty ile tam uyum ve TrueColor (24-bit) desteği
set-option -g default-shell /bin/zsh
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",alacritty:Tc"

set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 0
set -g focus-events on
set -g detach-on-destroy off

# ==============================================================================
# KEY BINDINGS
# ==============================================================================
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Config reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded!"

# Splits (Aynı dizinden devam eder)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation (Vim style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Windows
bind c new-window -c "#{pane_current_path}"
bind -n S-Left previous-window
bind -n S-Right next-window

# Diğer sessionları temizleme (Onay mekanizması eklendi)
bind X confirm-before -p "Kill other sessions? (y/n)" "run-shell 'tmux ls | grep -v \"^#{session_name}:\" | awk -F: \"{print \$1}\" | xargs -n 1 tmux kill-session -t'"

# ==============================================================================
# COPY MODE (VI)
# ==============================================================================
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind [ copy-mode
bind ] paste-buffer

# ==============================================================================
# STATUS BAR (Modern & Clean)
# ==============================================================================
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style 'bg=#282a36 fg=#f8f8f2' # Dracula uyumlu arka plan

set -g status-left-length 50
set -g status-left "#[fg=green,bold] 󱫋 #S #[fg=white]| "

set -g status-right-length 100
set -g status-right "#[fg=cyan]󱑎 %H:%M #[fg=white]| #[fg=magenta]󰃭 %d-%m-%y "

set -g window-status-format "#[fg=brightblack]#I:#W"
set -g window-status-current-format "#[fg=brightmagenta,bold] #I:#W#F "

setw -g monitor-activity on
set -g visual-activity off

# ==============================================================================
# PLUGINS (TPM)
# ==============================================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Plugin Ayarları
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# TPM Başlatıcı (En altta kalmalı)
run '~/.config/tmux/plugins/tpm/tpm'
